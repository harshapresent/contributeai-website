<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContributeAI QR Admin Console</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase configuration - Replace with your actual config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Main Admin Console Component
        const AdminConsole = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loading, setLoading] = useState(true);
            const [users, setUsers] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('lastLogin');
            const [sortOrder, setSortOrder] = useState('desc');
            const [adminEmail, setAdminEmail] = useState('');
            const [adminPassword, setAdminPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [stats, setStats] = useState({
                totalUsers: 0,
                activeToday: 0,
                newThisWeek: 0
            });

            useEffect(() => {
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        setIsAuthenticated(true);
                        loadUsers();
                    } else {
                        setIsAuthenticated(false);
                    }
                    setLoading(false);
                });
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    await auth.signInWithEmailAndPassword(adminEmail, adminPassword);
                    setIsAuthenticated(true);
                    loadUsers();
                } catch (error) {
                    setLoginError(error.message);
                }
            };

            const handleLogout = () => {
                auth.signOut();
                setIsAuthenticated(false);
                setUsers([]);
            };

            const loadUsers = async () => {
                try {
                    const snapshot = await db.collection('users').get();
                    const usersList = [];
                    snapshot.forEach(doc => {
                        usersList.push({ id: doc.id, ...doc.data() });
                    });
                    setUsers(usersList);
                    calculateStats(usersList);
                } catch (error) {
                    console.error('Error loading users:', error);
                }
            };

            const calculateStats = (usersList) => {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

                const activeToday = usersList.filter(user => {
                    const lastLogin = user.lastLogin?.toDate ? user.lastLogin.toDate() : new Date(user.lastLogin);
                    return lastLogin >= today;
                }).length;

                const newThisWeek = usersList.filter(user => {
                    const createdAt = user.createdAt?.toDate ? user.createdAt.toDate() : new Date(user.createdAt);
                    return createdAt >= weekAgo;
                }).length;

                setStats({
                    totalUsers: usersList.length,
                    activeToday,
                    newThisWeek
                });
            };

            const exportToCSV = () => {
                const headers = ['Email', 'Full Name', 'Phone Number', 'Company', 'Created At', 'Last Login'];
                const csvContent = [
                    headers.join(','),
                    ...filteredUsers.map(user => [
                        user.email || '',
                        user.fullName || '',
                        user.phoneNumber || '',
                        user.companyName || '',
                        formatDate(user.createdAt),
                        formatDate(user.lastLogin)
                    ].map(field => `"${field}"`).join(','))
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', `users_export_${new Date().toISOString().split('T')[0]}.csv`);
                a.click();
            };

            const formatDate = (date) => {
                if (!date) return '';
                const d = date.toDate ? date.toDate() : new Date(date);
                return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
            };

            const filteredUsers = users
                .filter(user => {
                    const search = searchTerm.toLowerCase();
                    return (
                        user.email?.toLowerCase().includes(search) ||
                        user.fullName?.toLowerCase().includes(search) ||
                        user.phoneNumber?.includes(search) ||
                        user.companyName?.toLowerCase().includes(search)
                    );
                })
                .sort((a, b) => {
                    const aVal = a[sortBy] || '';
                    const bVal = b[sortBy] || '';
                    
                    if (sortBy === 'lastLogin' || sortBy === 'createdAt') {
                        const aDate = aVal.toDate ? aVal.toDate() : new Date(aVal);
                        const bDate = bVal.toDate ? bVal.toDate() : new Date(bVal);
                        return sortOrder === 'asc' ? aDate - bDate : bDate - aDate;
                    }
                    
                    if (sortOrder === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center gradient-bg">
                        <div className="text-white text-2xl">Loading...</div>
                    </div>
                );
            }

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center gradient-bg">
                        <div className="glass-effect p-8 rounded-2xl shadow-2xl w-full max-w-md">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">ContributeAI</h1>
                                <p className="text-gray-600">Admin Console</p>
                            </div>
                            <form onSubmit={handleLogin}>
                                <div className="mb-4">
                                    <label className="block text-gray-700 text-sm font-bold mb-2">
                                        Admin Email
                                    </label>
                                    <input
                                        type="email"
                                        className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-purple-500 focus:outline-none"
                                        value={adminEmail}
                                        onChange={(e) => setAdminEmail(e.target.value)}
                                        required
                                    />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-gray-700 text-sm font-bold mb-2">
                                        Password
                                    </label>
                                    <input
                                        type="password"
                                        className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-purple-500 focus:outline-none"
                                        value={adminPassword}
                                        onChange={(e) => setAdminPassword(e.target.value)}
                                        required
                                    />
                                </div>
                                {loginError && (
                                    <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
                                        {loginError}
                                    </div>
                                )}
                                <button
                                    type="submit"
                                    className="w-full bg-purple-600 text-white font-bold py-3 rounded-lg hover:bg-purple-700 transition"
                                >
                                    Sign In
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="gradient-bg text-white shadow-lg">
                        <div className="container mx-auto px-6 py-4">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold">ContributeAI Admin Console</h1>
                                    <p className="text-purple-100">QR Code App Management</p>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="bg-white text-purple-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-100 transition"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Stats Cards */}
                    <div className="container mx-auto px-6 py-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm">Total Users</p>
                                        <p className="text-3xl font-bold text-gray-800">{stats.totalUsers}</p>
                                    </div>
                                    <div className="bg-purple-100 p-3 rounded-full">
                                        <svg className="w-8 h-8 text-purple-600" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm">Active Today</p>
                                        <p className="text-3xl font-bold text-gray-800">{stats.activeToday}</p>
                                    </div>
                                    <div className="bg-green-100 p-3 rounded-full">
                                        <svg className="w-8 h-8 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-md p-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm">New This Week</p>
                                        <p className="text-3xl font-bold text-gray-800">{stats.newThisWeek}</p>
                                    </div>
                                    <div className="bg-blue-100 p-3 rounded-full">
                                        <svg className="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Users Table */}
                        <div className="bg-white rounded-xl shadow-md">
                            <div className="p-6 border-b border-gray-200">
                                <div className="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                                    <h2 className="text-xl font-bold text-gray-800">Users</h2>
                                    <div className="flex space-x-4">
                                        <input
                                            type="text"
                                            placeholder="Search users..."
                                            className="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                        <button
                                            onClick={exportToCSV}
                                            className="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-green-700 transition"
                                        >
                                            Export CSV
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="bg-gray-50">
                                        <tr>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                                                onClick={() => {
                                                    setSortBy('email');
                                                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                                                }}>
                                                Email
                                            </th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                                                onClick={() => {
                                                    setSortBy('fullName');
                                                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                                                }}>
                                                Full Name
                                            </th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                Phone
                                            </th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                Company
                                            </th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                                                onClick={() => {
                                                    setSortBy('createdAt');
                                                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                                                }}>
                                                Created
                                            </th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100"
                                                onClick={() => {
                                                    setSortBy('lastLogin');
                                                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                                                }}>
                                                Last Login
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white divide-y divide-gray-200">
                                        {filteredUsers.map((user) => (
                                            <tr key={user.id} className="hover:bg-gray-50">
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                    {user.email}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                    {user.fullName || '-'}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                    {user.phoneNumber || '-'}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                    {user.companyName || '-'}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                    {formatDate(user.createdAt)}
                                                </td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                    {formatDate(user.lastLogin)}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {filteredUsers.length === 0 && (
                                    <div className="text-center py-8 text-gray-500">
                                        No users found
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<AdminConsole />, document.getElementById('root'));
    </script>
</body>
</html>
